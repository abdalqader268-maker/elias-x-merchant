workflows:
  ios-merchant-app:
    name: ElyasX Merchant - iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.eliasx.eliasXMerchant"
        APP_NAME: "ElyasX التجار"
        API_URL: "https://YOUR-SERVER.com/api/v1"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Configure Xcode signing
        script: |
          python3 << 'PYEOF'
          import re, os

          proj = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(proj) as f:
              content = f.read()

          # Clear CODE_SIGN_IDENTITY (handles [sdk=iphoneos*] variants)
          content = re.sub(r'"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]"\s*=\s*"[^"]*";',
                           '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";', content)
          content = re.sub(r'CODE_SIGN_IDENTITY\s*=\s*"[^"]*";',
                           'CODE_SIGN_IDENTITY = "";', content)

          # Switch to Manual signing
          content = content.replace('CODE_SIGN_STYLE = Automatic;',
                                    'CODE_SIGN_STYLE = Manual;')

          # Add DEVELOPMENT_TEAM = "" if not present (Flutter requires it set)
          if 'DEVELOPMENT_TEAM' not in content:
              content = re.sub(r'(CODE_SIGN_STYLE = Manual;)',
                               r'\1\n\t\t\t\tDEVELOPMENT_TEAM = "";', content)
          else:
              content = re.sub(r'DEVELOPMENT_TEAM\s*=\s*[^;]+;',
                               'DEVELOPMENT_TEAM = "";', content)

          with open(proj, 'w') as f:
              f.write(content)

          print('✅ Xcode project signing configured')
          PYEOF

      - name: Build iOS (no code signing - for Sideloadly)
        script: |
          # Run flutter build - ignore exit code because Flutter may fail on
          # post-build signing validation even though xcodebuild succeeded
          flutter build ios --release \
            --dart-define=API_URL=$API_URL \
            --no-codesign || true

          # Verify Runner.app was actually built
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ Runner.app found at $APP_PATH"
            ls -lah "$APP_PATH"
          else
            echo "❌ Runner.app not found. Checking build directory..."
            find build/ios -name "Runner.app" 2>/dev/null || echo "No Runner.app anywhere in build/"
            find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -3
            exit 1
          fi

      - name: Package IPA
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/ElyasX-Merchant.ipa Payload
          echo "✅ IPA created: $(du -sh ../ipa/ElyasX-Merchant.ipa)"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - abdalqader268@gmail.com
